<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="clock.js" defer></script>
    <link rel="stylesheet" href="clock.css">
    <title>Kell</title>
</head>

<body id="clockBody">
    <div id="nameContainer">
        <div id="Name">Argo.Luur</div>
    </div>
    <!-- HTML struktureerimiseks: Ctrl+A Ctrl+K Ctrl+F -->
    <div id="container">
        <div id="clockContainer">
            <div id="hours">00:</div>
            <div id="minutes">00:</div>
            <div id="seconds">00</div>
        </div>
        <div id="dateContainer">
            <div id="day">01.</div>
            <div id="month">01.</div>
            <div id="year">2000</div>
        </div>
       

    </div>

    <div id="controlContainer">
        <button id="randomColor">Suvaline taustavärv</button>
        <button id="changeClockOrder">Vaheta kellaaeg ja kuupäev</button>
        <button id="bigger">+</button>
        <button id="smaller">-</button>
        <button id="moveLeft"> <- </button>
        <button id="moveCenter"> -><- </button>
        <button id="moveRight"> -> </button>
        <button id="rainbowText">Vikerkaare kell</button>
    </div>
    <p id="repo"><a href="https://github.com/argoluur/kodutoo-1">https://github.com/argoluur/kodutoo-1</a></p>
    <div id="paused"></div>
</body>


</html>
