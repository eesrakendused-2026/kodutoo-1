<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="clock.js" defer></script>
    <link rel="stylesheet" href="clock.css">
    <title>Kell</title>
</head>

<body>
    <!-- HTML struktureerimiseks: Ctrl+A Ctrl+K Ctrl+F -->
    <div id="container">
        <div id="clockContainer">
            <div id="hours">00:</div>
            <div id="minutes">00:</div>
            <div id="seconds">00</div>
        </div>
        <div id="dateContainer">
            <div id="day">01.</div>
            <div id="month">01.</div>
            <div id="year">2000</div>
        </div>
        <div id="weekdayContainer">
            <div id="weekday">Pühapäev</div>
        </div>
        <div id="buttonContainer">
            <button id="bigger">+</button>
            <button id="smaller">-</button>
            <button id="colorBtn">Värv</button>
            <button id="bgBtn">Taust</button>
            <button id="fontBtn">Stiil</button>
            <button id="formatBtn">12h/24h</button>
            <button id="alignBtn">Asukoht</button>
        </div>
        <div id="authorInfo">
            <p>Autor: Gert Matthias Eljas</p>
            <a href="https://github.com/GertMatthias/kodutoo-1" target="_blank">Minu GitHubi repositoorium</a>
        </div>
    </div>
</body>
</html>
