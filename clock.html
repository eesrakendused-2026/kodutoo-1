<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="clock.js" defer></script>
    <link rel="stylesheet" href="clock.css">
    <title>Kell</title>
</head>

<body>
    <!-- HTML Struktureerimiseks: Ctrl+A Ctrl+K Ctrl+F -->
    <div id="container">
        <div id="guide">
            <p>Klikka tekstile või taustale värvi muutmiseks</p>
            <p>Klahvid: [+/-] teksti suurus, [1] kella font, [2] kuupäeva font, [Nooled] liiguta</p>
        </div>
        <div id="clockContainer">
            <div id="hours">00:</div>
            <div id="minutes">00:</div>
            <div id="seconds">00</div>
        </div>
        <div id="dateContainer">
            <div id="weekday">x, </div>
            <div id="day">01.</div>
            <div id="month">01.</div>
            <div id="year">2000</div>
        </div>
        <div id="buttonContainer">
            <button id="bigger">+</button>
            <button id="smaller">-</button>
        </div>
        <div id="footer">
            Autor: Kevin Lillemets, <a href="https://github.com/kevtlu/kodutoo-1">GitHub Repo</a>
        </div>
    </div>
</body>
</html>
