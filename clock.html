<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="clock.js" defer></script>
    <link rel="stylesheet" href="clock.css">
    <title>Kell</title>
</head>

<body>
    <!-- HTML struktureerimiseks: Ctrl+A Ctrl+K Ctrl+F -->
    <div id="container">
        <div id="clockContainer">
            <div id="hours">00:</div>
            <div id="minutes">00:</div>
            <div id="seconds">00</div>
        </div>
        <div id="dateContainer">
            <div id="day">01.</div>
            <div id="month">01.</div>
            <div id="year">2000</div>
        </div>
        <div id="weekdayContainer">
            <div id="weekday"></div>
        </div>
        <div id="buttonContainer">
            <button id="bigger">+</button>
            <button id="smaller">-</button>
        </div>
        <div id="buttonsContainer">
            <h4>Eraldi osade suuruse muutmine:</h4>
            <button id="biggerHours">Tunnid +</button>
            <button id="smallerHours">Tunnid -</button>
            <button id="biggerMinutes">Minutid +</button>
            <button id="smallerMinutes">Minutid -</button>
            <button id="biggerSeconds">Sekundid +</button>
            <button id="smallerSeconds">Sekundid -</button>
            <button id="biggerWeekday">Nädalapäev +</button>
            <button id="smallerWeekday">Nädalapäev -</button>
        </div>
        <div id="github">
            <h2>Kregor Veemaa<h2>
            <a href="#" id="repoLink">GitHub</a>
        </div>
    </div>
</body>
</html>
