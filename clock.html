<!DOCTYPE html>
<html lang="et">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="clock.js" defer></script>
    <link rel="stylesheet" href="clock.css">
    <title>Elektrooniline Kell - Maiko Nigul</title>
</head>
<body>
    <div>
        <h1>Maiko Nigul</h1>
        <a href="https://github.com/maiko-nigul/kodutoo-1" target="_blank">Minu GitHubi Repo</a>
    </div>

    <div id="instructions">
        <p>B - Taustavärv | C - Kella värv | F - Kirjastiil</p>
        <p>G - Glow efekt | L - Keel | +/- - Suurus</p>
    </div>

    <div id="container">
        <div id="clockContainer">
            <div id="hours">00:</div>
            <div id="minutes">00:</div>
            <div id="seconds">00</div>
        </div>
        <div id="dateContainer">
            <div id="day">01.</div>
            <div id="month">01.</div>
            <div id="year">2000</div>
            <div id="weekday" style="margin-left: 10px;"></div>
        </div>
        <div id="buttonContainer">
            <button id="bigger">+</button>
            <button id="smaller">-</button>
        </div>
    </div>
</body>
</html>
