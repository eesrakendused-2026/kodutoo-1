<!DOCTYPE html>
<html lang="et">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lauakell — Aurora</title>
    <!-- Prompt: "Load distinctive fonts for a fullscreen clock UI." -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;600&family=Orbitron:wght@500;700&family=Syne:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="clock.css">
    <script src="clock.js" defer></script>
</head>
<body>
    <div id="app" class="app">
        <main class="stage" id="stage">
            <p class="weekday" id="weekday" aria-live="polite">—</p>
            <div class="clock-row" id="clockRow" role="timer" aria-live="polite">
                <span class="time-part" id="hours">00</span>
                <span class="sep" id="sep1">:</span>
                <span class="time-part" id="minutes">00</span>
                <span class="sep" id="sep2">:</span>
                <span class="time-part" id="seconds">00</span>
                <span class="ampm" id="ampm" hidden>AM</span>
            </div>
            <p class="date-line" id="dateLine">—</p>
        </main>

        <aside class="panel" aria-label="Kella seaded">
            <h2 class="panel-title">Seaded</h2>
            <!-- Six user-adjustable attributes (assignment): -->
            <label class="ctl">
                <span class="ctl-label">Kella suurus (%)</span>
                <input type="range" id="scaleRange" min="40" max="160" value="100">
            </label>
            <label class="ctl">
                <span class="ctl-label">Tausta toon (hue)</span>
                <input type="range" id="bgHue" min="0" max="360" value="232">
            </label>
            <label class="ctl">
                <span class="ctl-label">Aktsendi toon</span>
                <input type="range" id="accentHue" min="0" max="360" value="168">
            </label>
            <label class="ctl">
                <span class="ctl-label">Kirjatüüp</span>
                <select id="fontSelect">
                    <option value="orbitron">Orbitron</option>
                    <option value="syne">Syne</option>
                    <option value="ibm">IBM Plex Sans</option>
                </select>
            </label>
            <button type="button" class="btn" id="toggleHour">24 tundi</button>
            <button type="button" class="btn" id="toggleLang">Nädalapäev: ET</button>
        </aside>

        <footer class="foot">
            <p class="author">Autor: <strong>Remus Markus Luht</strong></p>
            <p class="repo">
                <a id="repoLink" href="https://github.com/remus-markusluht/kodutoo-1" target="_blank" rel="noopener noreferrer">Rakenduse repositoorium</a>
            </p>
        </footer>
    </div>
</body>
</html>
