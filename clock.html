<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link rel="stylesheet" href="style.css">
    <script async src="script.js"></script>
    <title>Kell</title>
</head>
<body>
    <div id=info>
        <p>Karl Martin Vellik <a href="https://github.com/KVellik/kodutoo-1">Github</a></p>
    </div>

    <div id="container">
        <div id="time">Kellaaeg</div>       
    </div>

    <button id="showChoices" style="display: none;">⚙️</button>

    <div id="choices">
        <label for="backgroundColor">Vali taustavärv</label>
        <select id="backgroundColor">
            <option hidden>Vali värv</option>
            <option value="darkred">Punane</option>
            <option value="darkblue">Sinine</option>
            <option value="darkgoldenrod">Kollane</option>
            <option value="darkgreen">Roheline</option>
            <option value="darkmagenta">Roosa</option>
            <option value="rgb(58, 58, 58)">Hall (default)</option>
        </select>

        <label for="backgroundColor">Vali kella taustavärv</label>
        <select id="timeBackground">
            <option hidden>Vali värv</option>
            <option value="darkblue">Sinine</option>
            <option value="darkred">Punane</option>
            <option value="darkgreen">Roheline</option>
            <option value="darkorchid">Lilla</option>
            <option value="darkgoldenrod">Kollane</option>
            <option value="darkmagenta">Roosa</option>
        </select>

        <label for="fontStyle">Vali teksti stiil</label>
        <select id="fontStyle">
            <option hidden>Vali stiil</option>
            <option value="Brush Script MT">Brush Script</option>
            <option value="Garamond">Garamond</option>
            <option value="Monospace">Monospace</option>
            <option value="Times New Roman">Times New Roman (default)</option>
        </select>

        <label for="wallpaper">Taustapilt</label>
        <select id="wallpaper">
            <option hidden>Vali pilt</option>
            <option value="url('taustapilt1.jpg')">Pilt 1</option>
            <option value="url('taustapilt2.jpg')">Pilt 2</option>
            <option value="none">Default</option>
        </select>

        <label for="fullscreenBtn">Vaade</label>
        <button id="fullscreenBtn">Ava täisekraanil</button>

        <button id="hideChoices">Peida seaded ✖</button>

    </div>

    <div id="dateinfo">
        <div id="date">Kuupäev</div>
        <div id="month">Kuu</div>
        <div id="year">Aasta</div>
        <div id="weekday">Nädalapäev</div>
    </div>
    
</body>
</html>
